main:
  - date: 2023-12-01
    image: /assets/img/news/2023-12-01.jpg
    headline: "Received the Helpfeel award at the WISS 2023 conference."
    description: "For our work on e-learning accessibility, we received the Helpfeel award at the Workshop of Interactive Systems and Software (WISS) 2023. Read more on the [Scrapbox page](https://scrapbox.io/WISS2023/04_Smart_Replay:_e%E3%83%A9%E3%83%BC%E3%83%8B%E3%83%B3%E3%82%B0%E5%8B%95%E7%94%BB%E3%81%AB%E3%81%8A%E3%81%91%E3%82%8B%E8%A6%96%E8%A6%9A%E7%9A%84%E3%83%BB%E6%99%82%E9%96%93%E7%9A%84%E3%82%A2%E3%82%AF%E3%82%BB%E3%82%B7%E3%83%93%E3%83%AA%E3%83%86%E3%82%A3%E3%81%AE%E5%90%91%E4%B8%8A) or the official [WISS website](https://www.wiss.org/WISS2023/award.html)."
  
  - date: 2023-11-29
    # image:
    headline: "Oral presentation about our work on e-learning accessibility at WISS 2023."
    description: 'During the Workshop of Interactive Systems and Software (WISS) 2023, we will present our work on e-learning accessibility. The work is titled "Smart Replay: eラーニング動画における視覚的・時間的アクセシビリティの向上" and is a collaboration with Prof. Takeo Igarashi and Prof. Ariel SHAMIR.'

  - date: 2023-10-20
    # image:
    headline: "Received the Google AIR Grant for our work on e-learning accessibility together with Prof. Takeo Igarashi."
    description: "For our work on e-learning accessibility, we received the Google Award for Inclusion Research Grant. The grant will support our work on making e-learning more accessible to people with disabilities. The grant supervisor is [James Stout](https://handsfreecoding.org/) who is the Director of Accessibility at Google."

  - date: 2023-10-18
    # image:
    headline: "Our paper about e-learning accessibility was accepted to WISS 2023."
    description: "Our paper titled 'Smart Replay: eラーニング動画における視覚的・時間的アクセシビリティの向上' was accepted to the Workshop of Interactive Systems and Software (WISS) 2023. The paper is a collaboration with Prof. Takeo Igarashi and Prof. Ariel SHAMIR."
